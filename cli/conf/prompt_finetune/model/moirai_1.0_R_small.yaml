_target_: uni2ts.model.llm_moirai.LlmMoiraiFinetune.load_from_checkpoint
module_kwargs:
  _target_: builtins.dict
  distr_output:
    _target_: uni2ts.distribution.MixtureOutput
    components:
      - _target_: uni2ts.distribution.StudentTOutput
      - _target_: uni2ts.distribution.NormalFixedScaleOutput
      - _target_: uni2ts.distribution.NegativeBinomialOutput
      - _target_: uni2ts.distribution.LogNormalOutput
  d_model: 384
  num_layers: 6
  patch_sizes: ${as_tuple:[8, 16, 32, 64, 128]}
  max_seq_len: 512
  attn_dropout_p: 0.0
  dropout_p: 0.0
  scaling: true

llm_kwargs:
  _target_: builtins.dict
  llm_model: LLAMA2
  d_llm: 4096
  llm_layers: 6

proj_kwargs:
  _target_: builtins.dict
  projector: Resampler
  dropout: 0.1
  bias: True
  num_queries: 32

lora_kwargs:
  _target_: builtins.dict
  use_lora: True
  r: 16
  target_modules: ["q_proj", "k_proj"]
  lora_alpha: 32
  lora_dropout: 0.05

moirai_opt_mode: freeze

min_patches: 2
min_mask_ratio: 0.15
max_mask_ratio: 0.5
max_dim: 128
loss_func:
  _target_: uni2ts.loss.packed.PackedNLLLoss
val_metric:
  - _target_: uni2ts.loss.packed.PackedMSELoss
  - _target_: uni2ts.loss.packed.PackedNRMSELoss
    normalize: absolute_target_squared

lr: 1e-4
weight_decay: 1e-1
beta1: 0.9
beta2: 0.98
num_training_steps: ${mul:${trainer.max_epochs},${train_dataloader.num_batches_per_epoch}}
num_warmup_steps: 0
checkpoint_path: /home/eee/uni2ts/ckpt/moirai-1.0-R-small.ckpt